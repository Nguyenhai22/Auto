name: Run Code 3 Times A Day

on:
  schedule:
    # Chạy vào phút thứ 0 của các giờ: 1, 7, 13 (UTC)
    # Tương đương: 8:00, 14:00, 20:00 (Giờ Việt Nam) hằng ngày
    - cron: '0 1,7,13 * * *'
  
  # Cho phép kích hoạt chạy thủ công bằng nút bấm trên giao diện GitHub
  workflow_dispatch: 

jobs:
  run-my-code:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Tải toàn bộ mã nguồn từ Repository về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Thiết lập môi trường Python (mặc định bản 3.10 ổn định)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Cài đặt các thư viện cần thiết nếu dự án của bạn có file requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Thực thi file Python của bạn (thay 'main.py' bằng tên file code thực tế của bạn)
    - name: Run script
      run: python main.py
